<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Carnevale · Ventas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0f0f11;
      --surface: #18181c;
      --surface2: #222228;
      --border: #2e2e38;
      --text: #f0f0f4;
      --muted: #7b7b8e;
      --mañana: #f5a623;
      --mañana-dim: rgba(245,166,35,0.12);
      --tarde: #6c8ef5;
      --tarde-dim: rgba(108,142,245,0.12);
      --tarjeta: #6c8ef5;
      --transferencia: #3ecf8e;
      --transferencia-dim: rgba(62,207,142,0.12);
      --danger: #f56c6c;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: 80px;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 20px 0;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .brand span { color: var(--mañana); }

    /* turno badge */
    .turno-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: 'DM Mono', monospace;
    }
    .turno-badge.mañana { border-color: var(--mañana); color: var(--mañana); background: var(--mañana-dim); }
    .turno-badge.tarde  { border-color: var(--tarde);  color: var(--tarde);  background: var(--tarde-dim); }
    .turno-badge .dot { width: 7px; height: 7px; border-radius: 50%; }
    .turno-badge.mañana .dot { background: var(--mañana); }
    .turno-badge.tarde  .dot { background: var(--tarde); }

    /* tabs */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
      user-select: none;
    }
    .tab.active { color: var(--text); border-bottom-color: var(--mañana); }

    /* ── TURNO SELECTOR MODAL ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 40px;
      width: 100%;
      max-width: 480px;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .sheet h2 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      margin-bottom: 6px;
    }
    .sheet p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    .turno-options { display: flex; flex-direction: column; gap: 12px; }

    .turno-option {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 18px 20px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      cursor: pointer;
      transition: all .2s;
    }
    .turno-option:hover { border-color: var(--muted); }
    .turno-option.mañana:hover, .turno-option.mañana.selected { border-color: var(--mañana); background: var(--mañana-dim); }
    .turno-option.tarde:hover,  .turno-option.tarde.selected  { border-color: var(--tarde);  background: var(--tarde-dim);  }

    .turno-icon { font-size: 28px; }
    .turno-label { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; }
    .turno-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── SECTIONS ── */
    .section { display: none; padding: 20px; }
    .section.active { display: block; }

    /* ── FORM ── */
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }

    input[type="number"], input[type="text"], input[type="date"] {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      font-size: 18px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      outline: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    input:focus { border-color: var(--mañana); }

    /* tipo buttons */
    .tipo-btns { display: flex; gap: 10px; }
    .tipo-btn {
      flex: 1;
      padding: 14px;
      border-radius: var(--radius);
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .tipo-btn.tarjeta.selected    { border-color: var(--tarjeta);      color: var(--tarjeta);      background: rgba(108,142,245,.12); }
    .tipo-btn.transferencia.selected { border-color: var(--transferencia); color: var(--transferencia); background: var(--transferencia-dim); }

    /* submit */
    .btn-primary {
      width: 100%;
      padding: 16px;
      background: var(--mañana);
      color: #000;
      border: none;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
      margin-top: 8px;
    }
    .btn-primary:active { transform: scale(.98); opacity: .9; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--transferencia);
      color: #000;
      padding: 12px 24px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── VENTAS LIST ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .section-date {
      font-size: 12px;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      margin-bottom: 20px;
    }

    .turno-block { margin-bottom: 28px; }

    .turno-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .turno-pill {
      font-size: 11px;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      border-radius: 999px;
    }
    .turno-pill.mañana { background: var(--mañana-dim); color: var(--mañana); }
    .turno-pill.tarde  { background: var(--tarde-dim);  color: var(--tarde);  }

    .venta-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      animation: fadeIn .2s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .venta-left { display: flex; flex-direction: column; gap: 3px; }
    .venta-tipo {
      font-size: 11px;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
      text-transform: uppercase;
      letter-spacing: .8px;
    }
    .venta-tipo.tarjeta      { color: var(--tarjeta); }
    .venta-tipo.transferencia { color: var(--transferencia); }

    .venta-hora { font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; }
    .venta-comprobante { font-size: 11px; color: var(--muted); }

    .venta-monto {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      white-space: nowrap;
    }

    /* totales */
    .totales-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-top: 8px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      font-size: 14px;
    }
    .total-row .label { color: var(--muted); }
    .total-row .value { font-family: 'DM Mono', monospace; font-weight: 500; }
    .total-row.grand {
      border-top: 1px solid var(--border);
      margin-top: 6px;
      padding-top: 12px;
    }
    .total-row.grand .label { font-weight: 700; color: var(--text); font-size: 15px; }
    .total-row.grand .value { font-size: 18px; color: var(--mañana); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

    .total-general-box {
      background: var(--surface2);
      border: 2px solid var(--mañana);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
    }
    .total-general-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .total-general-value { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 500; color: var(--mañana); }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* date picker */
    .date-picker-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .date-picker-row input { flex: 1; font-size: 15px; padding: 12px 14px; }

    /* loader */
    .loader { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

    /* ── NAV ── (replaced by tabs above header) */
  </style>
</head>
<body>

<!-- TURNO OVERLAY -->
<div class="overlay" id="turnoOverlay">
  <div class="sheet">
    <h2>Seleccionar turno</h2>
    <p>¿En qué turno estás trabajando?</p>
    <div class="turno-options">
      <div class="turno-option mañana" onclick="setTurno('mañana')">
        <div class="turno-icon">🌅</div>
        <div>
          <div class="turno-label">Turno Mañana</div>
          <div class="turno-sub">Apertura → mediodía</div>
        </div>
      </div>
      <div class="turno-option tarde" onclick="setTurno('tarde')">
        <div class="turno-icon">🌆</div>
        <div>
          <div class="turno-label">Turno Tarde</div>
          <div class="turno-sub">Mediodía → cierre</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Venta guardada</div>

<!-- HEADER -->
<header>
  <div class="header-top">
    <div class="brand">Carne<span>vale</span></div>
    <div class="turno-badge" id="turnoBadge" onclick="openTurnoOverlay()">
      <div class="dot"></div>
      <span id="turnoLabel">—</span>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="showTab('cargar')">➕ Cargar</div>
    <div class="tab" onclick="showTab('hoy')">📋 Hoy</div>
    <div class="tab" onclick="showTab('historial')">📊 Historial</div>
  </div>
</header>

<!-- CARGAR VENTA -->
<div class="section active" id="sec-cargar">
  <br>
  <div class="section-title">Nueva venta</div>
  <p class="section-date" id="fechaHoy"></p>

  <div class="form-group">
    <label>Tipo de pago</label>
    <div class="tipo-btns">
      <button class="tipo-btn tarjeta selected" id="btn-tarjeta" onclick="selectTipo('tarjeta')">💳 Tarjeta</button>
      <button class="tipo-btn transferencia" id="btn-transferencia" onclick="selectTipo('transferencia')">📲 Transferencia</button>
    </div>
  </div>

  <div class="form-group">
    <label>Monto ($)</label>
    <input type="number" id="monto" placeholder="0.00" step="0.01" min="0" inputmode="decimal"/>
  </div>

  <div class="form-group">
    <label>N° Comprobante <span style="color:var(--muted);font-weight:400;text-transform:none">(opcional)</span></label>
    <input type="text" id="comprobante" placeholder="ej: 00012345" inputmode="numeric"/>
  </div>

  <button class="btn-primary" onclick="guardarVenta()" id="btnGuardar">Guardar venta</button>
</div>

<!-- HOY -->
<div class="section" id="sec-hoy">
  <br>
  <div class="section-title">Ventas de hoy</div>
  <p class="section-date" id="fechaHoyLabel"></p>
  <div id="listHoy"><div class="loader">Cargando...</div></div>
</div>

<!-- HISTORIAL -->
<div class="section" id="sec-historial">
  <br>
  <div class="section-title">Historial</div>
  <div class="date-picker-row">
    <input type="date" id="fechaHistorial" onchange="cargarHistorial()"/>
  </div>
  <div id="listHistorial"><div class="empty-state"><div class="empty-icon">📅</div>Elegí una fecha para ver las ventas</div></div>
</div>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ══════════════════════════════════════════
//  FIREBASE CONFIG — reemplazá estos valores
// ══════════════════════════════════════════
const firebaseConfig = {
  apiKey: "AIzaSyDFVZ99Hqs9xvfJPmyxARaX8ZlndF5fpMM",
  authDomain: "ferreteriacarnevale-918a0.firebaseapp.com",
  projectId: "ferreteriacarnevale-918a0",
  storageBucket: "ferreteriacarnevale-918a0.firebasestorage.app",
  messagingSenderId: "254608423500",
  appId: "1:254608423500:web:568b03c037bf25f64912e9",
  measurementId: "G-BNHNFVD3H9"
};
// ══════════════════════════════════════════

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── STATE ──
let turnoActivo = localStorage.getItem('turno') || null;
let tipoSeleccionado = 'tarjeta';
let unsubHoy = null;

// ── INIT ──
function init() {
  const hoy = fechaHoy();
  document.getElementById('fechaHoy').textContent = formatFechaLarga(hoy);
  document.getElementById('fechaHoyLabel').textContent = formatFechaLarga(hoy);
  document.getElementById('fechaHistorial').value = hoy;

  if (!turnoActivo) {
    openTurnoOverlay();
  } else {
    updateTurnoBadge();
  }

  // realtime hoy
  suscribirHoy();
}

// ── FECHAS ──
function fechaHoy() {
  return new Date().toISOString().split('T')[0];
}
function formatFechaLarga(str) {
  const [y,m,d] = str.split('-');
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${parseInt(d)} de ${meses[parseInt(m)-1]} de ${y}`;
}
function formatHora(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
}

// ── TURNO ──
function openTurnoOverlay() {
  document.getElementById('turnoOverlay').classList.add('show');
}
function setTurno(t) {
  turnoActivo = t;
  localStorage.setItem('turno', t);
  updateTurnoBadge();
  document.getElementById('turnoOverlay').classList.remove('show');
}
function updateTurnoBadge() {
  const badge = document.getElementById('turnoBadge');
  const label = document.getElementById('turnoLabel');
  badge.className = 'turno-badge ' + turnoActivo;
  label.textContent = turnoActivo === 'mañana' ? '☀️ Mañana' : '🌆 Tarde';
}

// ── TABS ──
function showTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  const idx = ['cargar','hoy','historial'].indexOf(name);
  document.querySelectorAll('.tab')[idx].classList.add('active');

  if (name === 'historial') cargarHistorial();
}

// ── TIPO ──
function selectTipo(t) {
  tipoSeleccionado = t;
  document.getElementById('btn-tarjeta').classList.toggle('selected', t === 'tarjeta');
  document.getElementById('btn-transferencia').classList.toggle('selected', t === 'transferencia');
}

// ── GUARDAR ──
async function guardarVenta() {
  const monto = parseFloat(document.getElementById('monto').value);
  const comprobante = document.getElementById('comprobante').value.trim();

  if (!monto || monto <= 0) {
    document.getElementById('monto').focus();
    return;
  }
  if (!turnoActivo) { openTurnoOverlay(); return; }

  const btn = document.getElementById('btnGuardar');
  btn.disabled = true;
  btn.textContent = 'Guardando...';

  try {
    await db.collection('ventas').add({
      fecha: fechaHoy(),
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      turno: turnoActivo,
      tipo: tipoSeleccionado,
      monto: monto,
      comprobante: comprobante || ''
    });

    document.getElementById('monto').value = '';
    document.getElementById('comprobante').value = '';
    showToast();
  } catch(e) {
    alert('Error al guardar: ' + e.message);
  }

  btn.disabled = false;
  btn.textContent = 'Guardar venta';
}

// ── TOAST ──
function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SUSCRIBIR HOY (realtime) ──
function suscribirHoy() {
  if (unsubHoy) unsubHoy();
  unsubHoy = db.collection('ventas')
    .where('fecha', '==', fechaHoy())
    .orderBy('timestamp', 'asc')
    .onSnapshot(snap => {
      const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
      renderVentas(ventas, 'listHoy');
    }, err => {
      // índice no creado aún
      db.collection('ventas')
        .where('fecha', '==', fechaHoy())
        .get().then(snap => {
          const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
          renderVentas(ventas, 'listHoy');
        });
    });
}

// ── CARGAR HISTORIAL ──
async function cargarHistorial() {
  const fecha = document.getElementById('fechaHistorial').value;
  if (!fecha) return;
  document.getElementById('listHistorial').innerHTML = '<div class="loader">Cargando...</div>';
  try {
    const snap = await db.collection('ventas')
      .where('fecha', '==', fecha)
      .orderBy('timestamp', 'asc')
      .get();
    const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderVentas(ventas, 'listHistorial', fecha);
  } catch(e) {
    // fallback sin orderBy
    const snap = await db.collection('ventas').where('fecha', '==', fecha).get();
    const ventas = snap.docs.map(d => ({id: d.id, ...d.data()}));
    renderVentas(ventas, 'listHistorial', fecha);
  }
}

// ── RENDER ──
function renderVentas(ventas, containerId, fechaLabel) {
  const el = document.getElementById(containerId);

  if (ventas.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🗒️</div>No hay ventas registradas</div>`;
    return;
  }

  const mañana = ventas.filter(v => v.turno === 'mañana');
  const tarde   = ventas.filter(v => v.turno === 'tarde');

  let html = '';

  if (mañana.length > 0) html += renderTurnoBlock(mañana, 'mañana');
  if (tarde.length > 0)  html += renderTurnoBlock(tarde,  'tarde');

  // total general
  const totalGen = ventas.reduce((s, v) => s + (v.monto || 0), 0);
  html += `
    <div class="total-general-box">
      <div class="total-general-label">Total del día</div>
      <div class="total-general-value">${formatMonto(totalGen)}</div>
    </div>`;

  el.innerHTML = html;
}

function renderTurnoBlock(ventas, turno) {
  const emoji = turno === 'mañana' ? '🌅' : '🌆';
  const label = turno === 'mañana' ? 'Turno Mañana' : 'Turno Tarde';

  const totalTarjeta = ventas.filter(v=>v.tipo==='tarjeta').reduce((s,v)=>s+v.monto,0);
  const totalTransf  = ventas.filter(v=>v.tipo==='transferencia').reduce((s,v)=>s+v.monto,0);
  const totalTurno   = totalTarjeta + totalTransf;

  let cards = ventas.map(v => `
    <div class="venta-card">
      <div class="venta-left">
        <span class="venta-tipo ${v.tipo}">${v.tipo === 'tarjeta' ? '💳 Tarjeta' : '📲 Transferencia'}</span>
        <span class="venta-hora">${formatHora(v.timestamp)}</span>
        ${v.comprobante ? `<span class="venta-comprobante">Comp. #${v.comprobante}</span>` : ''}
      </div>
      <div class="venta-monto">${formatMonto(v.monto)}</div>
    </div>`).join('');

  return `
    <div class="turno-block">
      <div class="turno-header">
        <span class="turno-pill ${turno}">${emoji} ${label}</span>
      </div>
      ${cards}
      <div class="totales-box">
        ${totalTarjeta > 0 ? `<div class="total-row"><span class="label">💳 Tarjeta</span><span class="value" style="color:var(--tarjeta)">${formatMonto(totalTarjeta)}</span></div>` : ''}
        ${totalTransf  > 0 ? `<div class="total-row"><span class="label">📲 Transferencia</span><span class="value" style="color:var(--transferencia)">${formatMonto(totalTransf)}</span></div>` : ''}
        <div class="total-row grand"><span class="label">Total ${label}</span><span class="value">${formatMonto(totalTurno)}</span></div>
      </div>
    </div>`;
}

function formatMonto(n) {
  return '$' + (n || 0).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// enter en monto → foco comprobante
document.getElementById('monto').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('comprobante').focus();
});
document.getElementById('comprobante').addEventListener('keydown', e => {
  if (e.key === 'Enter') guardarVenta();
});

// ── START ──
init();
</script>
</body>
</html>
